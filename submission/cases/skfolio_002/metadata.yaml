instance_id: skfolio_002
repo: skfolio/skfolio
source_commit: e7e60cb        # 出题方记录: fix(measures) variance with sample_weight
base_commit: 82f029e          # 修复前
fix_commit: e7e60cb           # 官方修复(参考, 不进 task/)

domain: risk_measures
# D1: 加权方差是基础统计概念(非 skfolio/金融独有); 金融语义(为何对样本加权)有助于
# 理解动机, 但并非完成任务的必要条件——具备通用统计与调试能力即可定位与修复。
domain_necessity: D1
difficulty: medium

# ============ 验收配置(通用 Runner v0.2 读取, 与 skfolio_001 同结构) ============
environment_id: skfolio_py312_v1
external_repo: ../external_workspaces/skfolio
environment:
  python: .envs/skfolio/bin/python        # 复用与 001 相同的环境
  install_command: "pip install -e . --no-deps -q"

validation:
  patch_file: agent_run/patch.applyable.diff
  allowed_patch_paths:
    - "src/skfolio/measures/_measures.py"
  forbidden_patch_paths:
    - "tests/**"

  baseline:
    public_test_command: "python -m pytest tests/test_public_reproduction.py -q -p no:cacheprovider"
    expected_exit_codes: [1]
    required_output_patterns:
      - "weighted variance result mismatch"   # 中性 assert 失败信息, 证明是目标 bug(不泄漏根因)
    forbidden_output_patterns:
      - "ImportError"
      - "ModuleNotFoundError"
      - "no tests ran"
      - "collected 0 items"
      - "TIMEOUT"

  public_test_command: "python -m pytest tests/test_public_reproduction.py -q -p no:cacheprovider"

  hidden_tests:
    copies:
      - source: grader/hidden_tests/test_hidden_regression.py
        destination: tests/test_hidden_regression.py
    command: "python -m pytest tests/test_hidden_regression.py -q -p no:cacheprovider"

  timeout_seconds: 600

oracle_type: behavioral_tests
public_tests: 1
hidden_tests: 3
network_required: false
external_services_required: false

status: reproducible

# Case 有效性 / Gold 结果 / Agent 结果 三者独立, 由第三阶段动态验收日志回填。
# 日志见 results/final_verification/{gold.log, agent.log}。
case_status: valid              # baseline 复现 + Gold Patch 7/7 通过 -> Case 有效
gold_validation: pass           # results/final_verification/002_gold.result.json: 7/7
agent_run_status: fail          # 标准 Case(Agent patch): 6/7, 仅 Hidden(completeness) FAIL
# 说明: 隐藏测试中的 semi_variance 用例定位为 completeness/related-behavior test
# (检验 Agent 是否将修复推广到同源函数), 而非防作弊类断言。
